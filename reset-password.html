<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <title data-i18n="resetPassword.meta.title">Rayah - Reset Password</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="./style.css" rel="stylesheet">
</head>

<body class="font-inter antialiased bg-white text-zinc-900 tracking-tight">

    <!-- Page wrapper -->
    <div class="flex flex-col min-h-screen overflow-hidden supports-[overflow:clip]:overflow-clip">

        <!-- Site header -->
        <div data-shared-partial="./partials/navbar.html"></div>

        <!-- Page content -->
        <main class="grow">
            
            <section class="relative before:absolute before:inset-0 before:h-80 before:pointer-events-none before:bg-linear-to-b before:from-zinc-100 before:-z-10">
                <div class="pt-32 pb-12 md:pt-40 md:pb-20">
                    <div class="px-4 sm:px-6">

                        <!-- Page header -->
                        <div class="max-w-3xl mx-auto text-center pb-12 md:pb-16">
                            <h1 class="font-inter-tight text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-linear-to-r from-zinc-500 via-zinc-900 to-zinc-900" data-i18n="resetPassword.hero.title">Reset your password</h1>
                        </div>

                        <!-- Form -->
                        <div class="max-w-[25rem] mx-auto p-6 rounded-lg shadow-2xl bg-linear-to-b from-zinc-100 to-zinc-50/.7 relative before:absolute before:-top-12 before:-left-16 before:w-96 before:h-96 before:bg-zinc-900 before:opacity-[.15] before:rounded-full before:blur-3xl before:-z-10">
                        
                            <form>
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-sm text-zinc-800 font-medium mb-2" for="email" data-i18n="resetPassword.form.emailLabel">Email</label>
                                        <input id="email" class="form-input text-sm w-full" type="email" placeholder="mark@acmecorp.com" data-i18n-placeholder="resetPassword.form.emailPlaceholder" required />
                                    </div>
                                </div>
                                <div class="mt-5">
                                    <button class="btn text-zinc-100 bg-zinc-900 hover:bg-zinc-800 w-full shadow-sm" data-i18n="resetPassword.form.submit">Reset Password</button>
                                </div>
                            </form>
                        
                        </div>

                    </div>
                </div>
            </section>

        </main>

        <!-- Site footer -->
        <div data-shared-partial="./partials/footer.html"></div>

    </div>

    <script src="./js/vendors/alpinejs.min.js" defer></script>
    <script src="./locales/locales.js"></script>
    <script src="./js/shared-layout.js"></script>
    <script src="./js/main.js"></script>

</body>

</html>
